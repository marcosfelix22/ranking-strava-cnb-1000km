name: Atualizar Ranking CNB 1.000 km Automático

on:
  schedule:
    - cron: '*/10 * * * *' # Roda todo dia às 23:59h (horário de Brasília)
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar bibliotecas
        run: pip install requests pandas openpyxl

      - name: Executar robô
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        run: python ranking.py

      - name: Salvar a planilha atualizada no GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "Robo CNB"
          git config --global user.email "bot@github.com"
          git add Ranking_CNB_1000km_2026.xlsx
          git commit -m "Ranking atualizado automaticamente" || exit 0
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
